<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Midnight Pro Chess</title>
    <script src="https://cloudflare.com"></script>
    <style>
        :root {
            --bg: #050505;
            --panel: #121212;
            --sq-light: #313131;
            --sq-dark: #1a1a1a;
            --gold: #ffcc00;
            --white-piece: #ffffff;
            --black-piece: #ff4747;
        }

        body {
            background-color: var(--bg);
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        #main-wrapper {
            display: flex;
            gap: 20px;
            background: var(--panel);
            padding: 30px;
            border-radius: 12px;
            border: 1px solid #333;
            box-shadow: 0 0 50px rgba(0,0,0,0.9);
        }

        #board {
            display: grid;
            grid-template-columns: repeat(8, 70px);
            grid-template-rows: repeat(8, 70px);
            border: 5px solid #000;
            position: relative;
        }

        .square {
            width: 70px;
            height: 70px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .light { background: var(--sq-light); }
        .dark { background: var(--sq-dark); }

        /* Piece Styling & Gliding */
        .piece {
            font-size: 50px;
            cursor: pointer;
            z-index: 10;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            user-select: none;
            filter: drop-shadow(0 0 5px rgba(0,0,0,0.8));
        }

        .w-piece { color: var(--white-piece); text-shadow: 0 0 15px rgba(255,255,255,0.3); }
        .b-piece { color: var(--black-piece); text-shadow: 0 0 15px rgba(255,71,71,0.3); }

        /* Chess.com Style Evaluation Icons */
        .eval-icon {
            position: absolute;
            top: -10px;
            right: -10px;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 12px;
            z-index: 100;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            animation: smoothExpand 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes smoothExpand {
            0% { transform: scale(0) rotate(-45deg); opacity: 0; }
            100% { transform: scale(1) rotate(0); opacity: 1; }
        }

        .icon-best { background: #96bc4b; color: white; }
        .icon-great { background: #5c8bb0; color: white; }
        .icon-blunder { background: #fa412d; color: white; }

        .sidebar {
            width: 200px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .status-box {
            background: #1a1a1a;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #333;
            text-align: center;
        }

        button {
            background: var(--gold);
            color: black;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover { transform: translateY(-2px); filter: brightness(1.2); }

        .selected { background: rgba(255, 204, 0, 0.4) !important; }
        .last-move { background: rgba(150, 188, 75, 0.3) !important; }
    </style>
</head>
<body>

<div id="main-wrapper">
    <div id="board"></div>
    <div class="sidebar">
        <h2 style="margin:0; color: var(--gold);">Grandmaster Dark</h2>
        <div class="status-box">
            <div id="turn-display">White to move</div>
        </div>
        <select id="level" style="padding:10px; background:#222; color:#fff; border-radius:5px;">
            <option value="1">Tier 1: Basic</option>
            <option value="2">Tier 2: Tactical</option>
            <option value="3" selected>Tier 3: Strategic (Sacrifice)</option>
        </select>
        <button onclick="resetGame()">New Match</button>
        <div id="history" style="font-size:12px; opacity:0.6; height:100px; overflow-y:auto;">Moves will appear here...</div>
    </div>
</div>

<script>
    const game = new Chess();
    const boardEl = document.getElementById('board');
    const glyphs = {p:'♟', r:'♜', n:'♞', b:'♝', q:'♛', k:'♚'};

    let selected = null;

    function createBoard() {
        boardEl.innerHTML = '';
        for (let i = 0; i < 64; i++) {
            const r = Math.floor(i / 8), c = i % 8;
            const pos = String.fromCharCode(97 + c) + (8 - r);
            const sq = document.createElement('div');
            sq.className = `square ${(r + c) % 2 === 0 ? 'light' : 'dark'}`;
            sq.dataset.pos = pos;
            sq.onclick = () => handleClick(pos);
            boardEl.appendChild(sq);
        }
        updateBoard();
    }

    function updateBoard() {
        document.querySelectorAll('.square').forEach(sq => {
            const p = game.get(sq.dataset.pos);
            sq.innerHTML = '';
            if (p) {
                const el = document.createElement('div');
                el.className = `piece ${p.color === 'w' ? 'w-piece' : 'b-piece'}`;
                el.innerText = glyphs[p.type];
                sq.appendChild(el);
            }
        });
        document.getElementById('turn-display').innerText = game.turn() === 'w' ? "Your Turn" : "AI Thinking...";
    }

    function handleClick(pos) {
        if (game.turn() !== 'w') return;

        if (selected === pos) {
            selected = null;
            clearHighlights();
            return;
        }

        const move = game.move({ from: selected, to: pos, promotion: 'q' });

        if (move) {
            selected = null;
            clearHighlights();
            highlight(move.from, move.to);
            applyEval(pos, move);
            updateBoard();
            setTimeout(aiMove, 600);
        } else {
            const p = game.get(pos);
            if (p && p.color === 'w') {
                selected = pos;
                clearHighlights();
                document.querySelector(`[data-pos='${pos}']`).classList.add('selected');
            }
        }
    }

    function aiMove() {
        if (game.game_over()) return;
        
        const depth = parseInt(document.getElementById('level').value);
        const moves = game.moves();
        
        // Simple Minimax for "Smarter" AI
        let bestMove = moves[Math.floor(Math.random() * moves.length)];
        let bestScore = -Infinity;

        moves.forEach(m => {
            game.move(m);
            let score = -evaluateBoard(game);
            game.undo();
            if (score > bestScore) {
                bestScore = score;
                bestMove = m;
            }
        });

        const mObj = game.move(bestMove);
        highlight(mObj.from, mObj.to);
        applyEval(mObj.to, mObj);
        updateBoard();
    }

    function evaluateBoard(g) {
        const vals = {p:10, n:30, b:30, r:50, q:90, k:900};
        let total = 0;
        g.board().forEach(row => {
            row.forEach(p => {
                if (p) total += (p.color === 'b' ? vals[p.type] : -vals[p.type]);
            });
        });
        return total;
    }

    function applyEval(pos, move) {
        const sq = document.querySelector(`[data-pos='${pos}']`);
        const icon = document.createElement('div');
        icon.className = 'eval-icon';
        
        if (move.captured) {
            icon.classList.add('icon-best');
            icon.innerText = '!!';
        } else {
            icon.classList.add('icon-great');
            icon.innerText = '★';
        }
        
        sq.appendChild(icon);
        setTimeout(() => icon.remove(), 1500);
    }

    function highlight(from, to) {
        clearHighlights();
        document.querySelector(`[data-pos='${from}']`).classList.add('last-move');
        document.querySelector(`[data-pos='${to}']`).classList.add('last-move');
    }

    function clearHighlights() {
        document.querySelectorAll('.square').forEach(s => s.classList.remove('selected', 'last-move'));
    }

    function resetGame() { game.reset(); createBoard(); }

    createBoard();
</script>
</body>
</html>
