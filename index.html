<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ULTRA DARK CHESS</title>
    <script src="https://cloudflare.com"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #wrapper { display: flex; background: #111; padding: 20px; border: 2px solid #333; border-radius: 10px; gap: 20px; box-shadow: 0 0 30px rgba(0,0,0,1); }
        
        /* High Contrast Board */
        table { border-collapse: collapse; border: 4px solid #444; }
        td { width: 65px; height: 65px; text-align: center; vertical-align: middle; padding: 0; position: relative; cursor: pointer; }
        
        /* Distinct Square Colors */
        .sq-l { background: #3d3d3d; } /* Lighter Grey */
        .sq-d { background: #1a1a1a; } /* Darker Grey */
        
        /* Piece Styling */
        .piece { font-size: 45px; user-select: none; transition: transform 0.2s; }
        .w { color: #ffffff; text-shadow: 0 0 10px rgba(255,255,255,0.5); }
        .b { color: #ff3e3e; text-shadow: 0 0 10px rgba(255,62,62,0.5); }

        /* Chess.com Eval Icons */
        .eval { position: absolute; top: -5px; right: -5px; width: 22px; height: 22px; border-radius: 50%; font-size: 12px; font-weight: bold; display: flex; align-items: center; justify-content: center; z-index: 100; animation: pop 0.3s ease; }
        .best { background: #96bc4b; color: #fff; }
        .brilliant { background: #1bbbbe; color: #fff; }
        @keyframes pop { from { transform: scale(0); } to { transform: scale(1); } }

        .side { width: 180px; display: flex; flex-direction: column; gap: 15px; }
        button { background: #96bc4b; border: none; padding: 10px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .selected { outline: 3px solid #ffcc00; outline-offset: -3px; }
    </style>
</head>
<body>

<div id="wrapper">
    <table id="chess-board"></table>
    <div class="side">
        <h2 style="color:#96bc4b; margin:0">VOX CHESS</h2>
        <div id="status">White to Move</div>
        <select id="diff" style="padding:5px; background:#222; color:#fff">
            <option value="2">Tier 2: Intermediate</option>
            <option value="3" selected>Tier 3: Strategic</option>
        </select>
        <button onclick="reset()">New Game</button>
    </div>
</div>

<script>
    const game = new Chess();
    const glyphs = {p:'♟', r:'♜', n:'♞', b:'♝', q:'♛', k:'♚'};
    let fromSq = null;

    function render() {
        const board = game.board();
        const table = document.getElementById('chess-board');
        table.innerHTML = '';

        for (let r = 0; r < 8; r++) {
            const tr = document.createElement('tr');
            for (let c = 0; c < 8; c++) {
                const td = document.createElement('td');
                const pos = String.fromCharCode(97 + c) + (8 - r);
                td.className = (r + c) % 2 === 0 ? 'sq-l' : 'sq-d';
                td.id = pos;
                td.onclick = () => move(pos);

                const p = board[r][c];
                if (p) {
                    const div = document.createElement('div');
                    div.className = `piece ${p.color}`;
                    div.innerText = glyphs[p.type];
                    td.appendChild(div);
                }
                tr.appendChild(td);
            }
            table.appendChild(tr);
        }
        document.getElementById('status').innerText = game.turn() === 'w' ? "Your Move" : "AI Thinking...";
    }

    function move(pos) {
        if (game.turn() !== 'w') return;

        if (fromSq === pos) {
            fromSq = null;
            render();
            return;
        }

        const attempt = game.move({ from: fromSq, to: pos, promotion: 'q' });
        if (attempt) {
            fromSq = null;
            showIcon(pos, attempt);
            render();
            setTimeout(aiMove, 500);
        } else {
            const p = game.get(pos);
            if (p && p.color === 'w') {
                fromSq = pos;
                render();
                document.getElementById(pos).classList.add('selected');
            }
        }
    }

    function aiMove() {
        const moves = game.moves();
        if (moves.length === 0) return;

        // Strategic Logic (Tier 3)
        let best = moves[0];
        let maxScore = -9999;
        
        moves.forEach(m => {
            game.move(m);
            let score = -evaluate();
            game.undo();
            if (score > maxScore) { maxScore = score; best = m; }
        });

        const mObj = game.move(best);
        showIcon(mObj.to, mObj);
        render();
    }

    function evaluate() {
        const scores = {p:10, n:30, b:30, r:50, q:90, k:900};
        let total = 0;
        game.board().forEach(row => {
            row.forEach(p => { if(p) total += (p.color === 'w' ? -scores[p.type] : scores[p.type]); });
        });
        return total;
    }

    function showIcon(pos, m) {
        const td = document.getElementById(pos);
        const icon = document.createElement('div');
        icon.className = 'eval ' + (m.captured ? 'brilliant' : 'best');
        icon.innerText = m.captured ? '!!' : '★';
        td.appendChild(icon);
        setTimeout(() => icon.remove(), 1200);
    }

    function reset() { game.reset(); render(); }
    render();
</script>
</body>
</html>
