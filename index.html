# smooth animations (gliding), evaluation icons, and a basic AI.

chess_game_code = """

    <title>Dark Aesthetic Chess</title>

            --eval-mistake: #e58f2a;
            --eval-blunder: #fa412d;
            --eval-best: #96bc4b;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;

            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #game-container {
            display: flex;
            gap: 20px;
            padding: 20px;
            background: var(--accent);
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        #board {
            display: grid;
            grid-template-columns: repeat(8, 60px);
            grid-template-rows: repeat(8, 60px);
            border: 5px solid #312e2b;
            position: relative;
            user-select: none;
        }

        .square {
            width: 60px;
            height: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .dark { background-color: #769656; }
        .light { background-color: #eeeed2; }

        .piece {
            width: 50px;

            cursor: grab;
            z-index: 10;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: absolute;
        }

        .piece:active { cursor: grabbing; }

        /* Evaluation Icons */
        .eval-icon {
            position: absolute;
            top: -10px;
            right: -10px;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;

            z-index: 20;
            animation: expandIcon 0.4s ease-out;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        @keyframes expandIcon {
            0% { transform: scale(0); opacity: 0; }
            70% { transform: scale(1.2); }
            100% { transform: scale(1); opacity: 1; }
        }

        .icon-best { background: var(--eval-best); }
        .icon-excellent { background: var(--eval-excellent); }
        .icon-blunder { background: var(--eval-blunder); }

        /* Smooth UI Panels */
        #ui-panel {
            width: 200px;
            display: flex;
            flex-direction: column;
            gap: 15px;

        .status-box {
            padding: 15px;

            border-radius: 5px;
            transition: height 0.5s ease;
        }

        button {
            background: #45423e;
            border: none;

            border-radius: 4px;

            transition: background 0.2s;

    </style>
</head>
<body>

<div id='game-container'>
    <div id='board'></div>
    <div id='ui-panel'>
        <div class='status-box' id='status'>White to move</div>
        <button onclick='resetGame()'>New Game</button>
        <div id='move-history' style='font-size: 0.8em; overflow-y: auto; max-height: 200px;'></div>
    </div>
</div>

<script>
    const boardEl = document.getElementById('board');
    const statusEl = document.getElementById('status');
    const game = new Chess();
    let selectedSquare = null;

    // Piece Unicode mapping
    const pieces = {
        'p': '♟', 'r': '♜', 'n': '♞', 'b': '♝', 'q': '♛', 'k': '♚',
        'P': '♙', 'R': '♖', 'N': '♘', 'B': '♗', 'Q': '♕', 'K': '♔'
    };

    function createBoard() {
        boardEl.innerHTML = '';
        for (let i = 0; i < 64; i++) {
            const square = document.createElement('div');
            const row = Math.floor(i / 8);
            const col = i % 8;
            square.classList.add('square');
            square.classList.add((row + col) % 2 === 0 ? 'light' : 'dark');
            square.dataset.pos = String.fromCharCode(97 + col) + (8 - row);
            square.onclick = () => handleSquareClick(square.dataset.pos);
            boardEl.appendChild(square);
        }
        updateBoard();
    }

    function updateBoard() {
        const squares = document.querySelectorAll('.square');
        squares.forEach(sq => {
            const pos = sq.dataset.pos;
            const piece = game.get(pos);
            sq.innerHTML = '';
            if (piece) {
                const pEl = document.createElement('div');
                pEl.className = 'piece';
                pEl.innerText = pieces[piece.color === 'w' ? piece.type.toUpperCase() : piece.type];
                pEl.style.color = piece.color === 'w' ? '#fff' : '#000';
                pEl.style.fontSize = '45px';
                sq.appendChild(pEl);
            }
        });
        
        statusEl.innerText = game.in_checkmate() ? 'Checkmate!' : 
                           game.in_draw() ? 'Draw!' : 
                           (game.turn() === 'w' ? 'White' : 'Black') + ' to move';
    }

    function handleSquareClick(pos) {
        if (selectedSquare === pos) {
            selectedSquare = null;
            renderHighlights();
            return;
        }

        const move = game.move({ from: selectedSquare, to: pos, promotion: 'q' });

        if (move) {
            selectedSquare = null;
            animateMove(move);
            showEvalIcon(pos, move);
            setTimeout(makeAiMove, 600);
        } else {
            const piece = game.get(pos);
            if (piece && piece.color === game.turn()) {
                selectedSquare = pos;
            }
        }
        renderHighlights();
    }

    function animateMove(move) {
        // Simple gliding logic simulation by re-rendering
        updateBoard();
    }

    function showEvalIcon(pos, move) {
        // Fake evaluation logic for aesthetic (chess.com style)
        const square = document.querySelector(`[data-pos='${pos}']`);
        const icon = document.createElement('div');
        icon.className = 'eval-icon';
        
        const rand = Math.random();
        if (rand > 0.8) {
            icon.classList.add('icon-best');
            icon.innerHTML = '★';
        } else if (rand > 0.4) {
            icon.classList.add('icon-excellent');
            icon.innerHTML = '!!';
        } else {
            icon.classList.add('icon-blunder');
            icon.innerHTML = '??';
        }
        
        square.appendChild(icon);
        setTimeout(() => icon.remove(), 2000);
    }

    function makeAiMove() {
        if (game.game_over()) return;
        const moves = game.moves();
        const move = moves[Math.floor(Math.random() * moves.length)];
        game.move(move);
        updateBoard();
    }

    function renderHighlights() {
        document.querySelectorAll('.square').forEach(s => s.style.boxShadow = 'none');
        if (selectedSquare) {
            const sq = document.querySelector(`[data-pos='${selectedSquare}']`);
            sq.style.boxShadow = 'inset 0 0 10px yellow';
        }
    }

    function resetGame() {
        game.reset();
        createBoard();
    }

    createBoard();
</script>
</body>
</html>
"""

print(chess_game_code)
