<!DOCTYPE html>
<html lang="en-AU">
<head>
    <meta charset="UTF-8">
    <title>Equinox Games</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body, html { height: 100vh; width: 100vw; background: #000; overflow: hidden; }

        #chess-cloak, #games-embed {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border: none;
        }
        #games-embed { display: none; z-index: 20; }

        #auth-overlay {
            position: fixed;
            bottom: -100%;
            left: 50%;
            transform: translateX(-50%);
            width: 440px;
            background: rgba(8, 8, 28, 0.98);
            border: 3px solid #00ffcc;
            border-radius: 24px;
            box-shadow: 0 0 50px #00ffcc, 0 0 100px rgba(0, 255, 204, 0.6);
            padding: 35px 30px;
            text-align: center;
            z-index: 99999;
            transition: all 0.7s cubic-bezier(0.23, 1, 0.32, 1);
            display: none;
        }
        #auth-overlay.show { bottom: 90px; display: block; }

        .neon-title {
            color: #00ffcc;
            text-shadow: 0 0 20px #00ffcc;
            font-size: 1.6rem;
            font-weight: bold;
            letter-spacing: 3px;
            margin-bottom: 22px;
        }
        #password-input {
            width: 100%;
            padding: 18px;
            font-size: 1.25rem;
            background: #0a0a1f;
            border: 2px solid #00ffcc;
            border-radius: 12px;
            color: white;
            outline: none;
        }
        #password-input.error {
            border-color: #ff3366;
            box-shadow: 0 0 25px #ff3366;
        }
        #status { margin-top: 18px; min-height: 30px; font-size: 1.1rem; }

        #blocked-screen {
            position: fixed;
            inset: 0;
            background: #110000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100000;
            color: #ff3366;
        }
        .blocked-title { font-size: 4.2rem; text-shadow: 0 0 40px #ff3366; margin-bottom: 20px; }
    </style>
</head>
<body>

    <!-- Chess Cloak -->
    <iframe id="chess-cloak" src="https://tribui5467-hub.github.io/Chess_Practice-Elo/" allowfullscreen></iframe>

    <!-- Games Page -->
    <iframe id="games-embed" src="https://tribui5467-hub.github.io/Chess.Practice-Elo/" allowfullscreen></iframe>

    <!-- Auth Overlay -->
    <div id="auth-overlay">
        <div class="neon-title">STATE AUTHENTICATION KEY</div>
        <input type="password" id="password-input" placeholder="Enter key..." autocomplete="off">
        <div id="status"></div>
    </div>

    <!-- Blocked Screen -->
    <div id="blocked-screen">
        <div class="blocked-title">ACCESS BLOCKED</div>
        <p style="font-size:1.6rem; margin:20px 0;">You have been permanently restricted.</p>
        <p style="color:#ff6688;">Refreshing will not bypass this.</p>
    </div>

<script>
    let keySequence = [];
    let lastKeyTime = 0;
    const SEQUENCE_TIMEOUT = 2000;
    let attempts = 3;
    let isBlocked = false;
    let dailyPasswords = null;

    // Load passwords from your repo
    async function loadPasswords() {
        try {
            const response = await fetch('https://cdn.jsdelivr.net/gh/tribui5467-hub/Equinox-Assets_-Chess.Practice-Elo-/main/passwords.json');
            dailyPasswords = await response.json();
        } catch (e) {
            console.error("Failed to load passwords");
        }
    }

    function getDailyPassword() {
        if (!dailyPasswords) return "";
        const days = ['sunday','monday','tuesday','wednesday','thursday','friday','saturday'];
        const today = days[new Date().getDay()];
        return dailyPasswords[today] || "";
    }

    function checkBlocked() {
        if (localStorage.getItem('equinoxBlocked') === 'true') {
            isBlocked = true;
            document.getElementById('blocked-screen').style.display = 'flex';
            document.getElementById('chess-cloak').style.display = 'none';
        }
    }

    function showAuthBox() {
        const overlay = document.getElementById('auth-overlay');
        overlay.style.display = 'block';
        setTimeout(() => overlay.classList.add('show'), 10);
        document.getElementById('password-input').focus();
    }

    function handleFailedAttempt() {
        attempts--;
        const input = document.getElementById('password-input');
        const status = document.getElementById('status');
        input.classList.add('error');

        if (attempts > 0) {
            status.innerHTML = `<span style="color:#ff3366;">Incorrect. ${attempts} attempt${attempts > 1 ? 's' : ''} remaining.</span>`;
        } else {
            status.innerHTML = `<span style="color:#ff3366;">All attempts exhausted.</span>`;
            setTimeout(() => {
                isBlocked = true;
                localStorage.setItem('equinoxBlocked', 'true');
                document.getElementById('blocked-screen').style.display = 'flex';
                document.getElementById('auth-overlay').style.display = 'none';
            }, 1400);
        }
        setTimeout(() => input.classList.remove('error'), 800);
    }

    function checkPassword() {
        const entered = document.getElementById('password-input').value.trim();
        if (entered === getDailyPassword()) {
            const overlay = document.getElementById('auth-overlay');
            overlay.style.bottom = '-100%';
            setTimeout(() => {
                overlay.style.display = 'none';
                document.getElementById('chess-cloak').style.display = 'none';
                document.getElementById('games-embed').style.display = 'block';
            }, 600);
        } else {
            handleFailedAttempt();
        }
    }

    // Secret code: 4367 (no Shift)
    document.addEventListener('keydown', (e) => {
        if (isBlocked) return;
        const now = Date.now();
        if (now - lastKeyTime > SEQUENCE_TIMEOUT) keySequence = [];
        lastKeyTime = now;

        keySequence.push(e.key);
        if (keySequence.length > 4) keySequence.shift();

        if (keySequence.length === 4 &&
            keySequence[0] === '4' &&
            keySequence[1] === '3' &&
            keySequence[2] === '6' &&
            keySequence[3] === '7') {
            
            showAuthBox();
            keySequence = [];
        }
    });

    document.getElementById('password-input').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') checkPassword();
    });

    // ===================== ANTI-INSPECT (Ctrl+U blocked) =====================
    document.addEventListener('keydown', function(e) {
        if (e.ctrlKey && (e.key === 'u' || e.key === 'U' || e.key === 'i' || e.key === 'I' || e.key === 's' || e.key === 'S')) {
            e.preventDefault();
            return false;
        }
        if (e.key === 'F12') {
            e.preventDefault();
            return false;
        }
        if (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'C' || e.key === 'J')) {
            e.preventDefault();
            return false;
        }
    });

    // Block right click
    document.addEventListener('contextmenu', function(e) {
        e.preventDefault();
        return false;
    });

    // Special bypass for YOU (Tri) - Press "T R I" quickly to disable protection
    let bypassSeq = [];
    document.addEventListener('keypress', (e) => {
        bypassSeq.push(e.key.toLowerCase());
        if (bypassSeq.length > 3) bypassSeq.shift();
        if (bypassSeq.join('') === 'tri') {
            alert("🔓 Protection Disabled for this session");
            // You can now use Ctrl+U
            document.onkeydown = null;
            document.oncontextmenu = null;
        }
    });

    window.onload = async () => {
        checkBlocked();
        await loadPasswords();
    };
</script>
</body>
</html>
