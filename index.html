<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Practice | Elo</title>
    <link id="favicon" rel="icon" type="image/webp" href="noFilter.webp">
    <link href="https://fonts.googleapis.com/css2?family=Chewy&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
   
    <style>
        :root { --primary: #a855f7; --accent: #22c55e; --bg: #020617; --text: #ffffff; --card: rgba(30, 41, 59, 0.5); }
        body { background-color: var(--bg); color: var(--text); font-family: 'Chewy', cursive; transition: all 0.3s ease; overflow-x: hidden; min-height: 100vh; }
        #particle-canvas { position: fixed; top: 0; left: 0; z-index: -1; pointer-events: none; }
       
        .main-logo-container { display: flex; justify-content: center; padding-top: 40px; margin-bottom: -10px; }
        .main-logo { width: 350px; height: auto; filter: drop-shadow(0 0 15px var(--primary)); cursor: pointer; transition: transform 0.3s ease; }
        .main-logo:hover { transform: scale(1.05); }
        .island-header { background: rgba(255,255,255,0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); border-radius: 99px; padding: 10px 28px; display: flex; align-items: center; gap: 20px; margin: 20px auto 30px; width: fit-content; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .nav-icon { font-size: 1.5rem; cursor: pointer; transition: color 0.2s; opacity: 0.7; }
        .nav-icon:hover { color: var(--primary) !important; opacity: 1; }
       
        .penguin-nav-btn { height: 40px; width: 40px; object-fit: contain; cursor: pointer; transition: filter 0.3s; }
        .penguin-nav-btn:hover { filter: drop-shadow(0 0 8px var(--primary)); }

        .game-card { position: relative; aspect-ratio: 1/1; overflow: hidden; border-radius: 1.2rem; border: 2px solid transparent; transition: all 0.3s; background: var(--card); cursor: pointer; }
        .game-card:hover { border-color: var(--primary); transform: scale(1.03); box-shadow: 0 0 15px var(--primary); }
        .game-card img { width: 100%; height: 100%; object-fit: cover; }

        .card-title { position: absolute; bottom: -100%; left: 0; width: 100%; background: linear-gradient(transparent, rgba(0,0,0,0.9)); padding: 20px 12px 10px; transition: bottom 0.3s ease; font-size: 0.85rem; display: flex; justify-content: space-between; align-items: center; }
        .game-card:hover .card-title { bottom: 0; }

        .more-btn { opacity: 0; transition: all 0.3s; background: rgba(0,0,0,0.7); width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; color: white; }
        .game-card:hover .more-btn { opacity: 1; }

        .category-tabs { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin: 10px 0 35px; }
        .cat-tab { padding: 8px 22px; border-radius: 9999px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); cursor: pointer; transition: all 0.3s; }
        .cat-tab.active { background: var(--primary); color: black; border-color: var(--primary); box-shadow: 0 0 15px var(--primary); }
        .group-header { grid-column: 1 / -1; color: var(--primary); font-size: 1.9rem; margin: 35px 0 15px 10px; text-shadow: 0 0 10px var(--primary); }

        .details-tabs { display: flex; border-b: 2px solid rgba(255,255,255,0.1); margin-bottom: 20px; }
        .details-tab { padding: 10px 20px; cursor: pointer; font-weight: bold; transition: all 0.3s; }
        .details-tab.active { color: var(--primary); border-bottom: 3px solid var(--primary); }
    </style>
</head>
<body class="p-4">
    <canvas id="particle-canvas"></canvas>

    <!-- Download Popup -->
    <div id="downloadPopup" class="fixed inset-0 bg-black/80 backdrop-blur-md z-[300] hidden flex items-center justify-center">
        <div class="bg-slate-900 border border-white/10 p-8 rounded-3xl max-w-md text-center shadow-2xl">
            <h2 class="text-2xl mb-4 text-white">Offline Downloadable File</h2>
            <p class="text-lg mb-6">You can now download the site as a file on your computer! <br>Download it <span class="download-here-link" onclick="downloadFile()">here</span>.</p>
            <div class="flex items-center justify-center gap-3 mb-6">
                <input type="checkbox" id="dontShowAgain" class="w-4 h-4 cursor-pointer">
                <label for="dontShowAgain" class="text-sm opacity-80 cursor-pointer">Do not show again</label>
            </div>
            <button onclick="closePopup()" class="bg-white/10 px-8 py-2 rounded-full hover:bg-white/20 transition-all">Close</button>
        </div>
    </div>

    <div class="main-logo-container">
        <img id="mainLogoImg" src="" alt="Logo" class="main-logo" onclick="location.reload()">
    </div>

    <header class="island-header">
        <img id="penguinHeadImg" src="" onclick="location.reload()" class="penguin-nav-btn" title="Home">
        <div class="h-6 w-[1px] bg-white/20"></div>
        <i class="fas fa-gamepad nav-icon" onclick="renderGames('games')" title="Games"></i>
        <i class="fas fa-th-large nav-icon" onclick="renderGames('apps')" title="Apps"></i>
        <i class="fas fa-dice nav-icon" onclick="openRandomGame()" title="Random Game"></i>
        <i class="fas fa-link nav-icon" onclick="renderGames('backups')" title="Backups"></i>
        <i class="fas fa-circle-info nav-icon" onclick="toggleInfo()" title="Info"></i>
        <div class="relative">
            <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-sm opacity-50"></i>
            <input type="text" id="searchInput" placeholder="Search games or genres..." class="bg-white/5 border border-white/10 py-1 pl-9 pr-4 rounded-full focus:outline-none focus:ring-1 focus:ring-primary text-sm w-64">
        </div>
        <i class="fas fa-sliders nav-icon" onclick="toggleSettings()"></i>
    </header>

    <main class="max-w-7xl mx-auto pt-6">
        <div id="categoryTabs" class="category-tabs"></div>
        <div id="gameGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-5"></div>
    </main>

    <!-- Details Modal -->
    <div id="gameDetailsModal" class="fixed inset-0 bg-black/90 backdrop-blur-md hidden flex items-center justify-center z-[150]">
        <div class="bg-slate-900 border border-white/10 rounded-3xl max-w-lg w-full mx-4 p-8" onclick="event.stopPropagation()">
            <div class="flex justify-between items-start mb-6">
                <h2 id="detailsTitle" class="text-3xl" style="color: var(--primary);"></h2>
                <button onclick="closeDetailsModal()" class="text-3xl text-gray-400 hover:text-white">×</button>
            </div>

            <div class="details-tabs flex border-b border-white/10 mb-6">
                <div onclick="switchTab(0)" id="tab0" class="details-tab active px-5 py-2 cursor-pointer">Information</div>
                <div onclick="switchTab(1)" id="tab1" class="details-tab px-5 py-2 cursor-pointer">Analytics</div>
                <div onclick="switchTab(2)" id="tab2" class="details-tab px-5 py-2 cursor-pointer">Reviews</div>
            </div>

            <div id="tabContent0">
                <img id="detailsThumb" class="w-full rounded-2xl mb-6" style="max-height: 260px; object-fit: cover;">
                <p class="mb-2"><strong>Genre:</strong> <span id="detailsGenre" class="text-green-400"></span></p>
                <p id="detailsDesc" class="text-gray-300 leading-relaxed"></p>
            </div>

            <div id="tabContent1" class="hidden">
                <h3 class="text-xl mb-4">Live Analytics</h3>
                <canvas id="analyticsChart" height="180"></canvas>
                <div class="mt-4 grid grid-cols-2 gap-4 text-sm">
                    <div><strong class="text-green-400">● Playing Now:</strong> <span id="playingNow">842</span></div>
                    <div><strong class="text-gray-400">● Tab Open:</strong> <span id="tabOpen">1,237</span></div>
                </div>
            </div>

            <div id="tabContent2" class="hidden">
                <h3 class="text-xl mb-4">Player Reviews</h3>
                <div id="reviewsList" class="max-h-64 overflow-y-auto space-y-4 mb-6 text-sm"></div>
                
                <div class="flex gap-1 mb-3" id="starRating">
                    <span onclick="setRating(1)" class="text-3xl cursor-pointer text-gray-400 hover:text-yellow-400">★</span>
                    <span onclick="setRating(2)" class="text-3xl cursor-pointer text-gray-400 hover:text-yellow-400">★</span>
                    <span onclick="setRating(3)" class="text-3xl cursor-pointer text-gray-400 hover:text-yellow-400">★</span>
                    <span onclick="setRating(4)" class="text-3xl cursor-pointer text-gray-400 hover:text-yellow-400">★</span>
                    <span onclick="setRating(5)" class="text-3xl cursor-pointer text-gray-400 hover:text-yellow-400">★</span>
                </div>
                
                <textarea id="reviewInput" rows="3" placeholder="Write your honest review..." class="w-full bg-slate-800 border border-white/20 rounded-xl p-4"></textarea>
                <button onclick="submitReview()" class="mt-3 w-full bg-green-500 text-black py-3 rounded-2xl font-bold">Submit Review</button>
            </div>

            <button onclick="playFromDetails()" class="mt-6 w-full bg-green-500 text-black py-3 rounded-2xl font-bold">▶ Play Game</button>
        </div>
    </div>

    <!-- Game Modal -->
    <div id="gameModal" class="fixed inset-0 z-[110] hidden bg-black/95 flex flex-col">
        <div class="flex-1 p-4">
            <div class="bg-black rounded-2xl overflow-hidden border border-white/5 h-full">
                <div id="iframeContainer" class="w-full h-full"></div>
            </div>
        </div>
        <div class="h-20 px-8 flex items-center justify-between bg-white/5 backdrop-blur-md">
            <div class="flex items-center gap-4">
                <img id="modalIcon" src="" class="h-10 w-10 rounded-lg object-cover">
                <h3 id="modalTitle" class="text-xl"></h3>
            </div>
            <div class="flex items-center gap-8">
                <button onclick="openAboutBlank()" class="nav-icon" title="Cloak"><i class="fas fa-mask text-xl"></i></button>
                <button onclick="toggleFullscreen()" class="nav-icon"><i class="fas fa-expand text-xl"></i></button>
                <button onclick="closeGame()" class="text-red-500 text-2xl"><i class="fas fa-times"></i></button>
            </div>
        </div>
    </div>

<script>
    const repoOwner = "tribui5467-hub";
    const repoName = "Equinox-Assets_-Chess.Practice-Elo-";
    const cdnBase = `https://cdn.jsdelivr.net/gh/${repoOwner}/${repoName}@main/`;
   
    let games = [];
    let backups = [];
    let currentLatestSha = "";
    let currentFilter = 'games';
    let currentCategory = 'All';
    let particlesEnabled = true;
    let currentGameId = null;
    let currentRating = 5;
    let analyticsChart = null;

    function closePopup() {
        if (document.getElementById('dontShowAgain').checked) localStorage.setItem('hideDownloadPopup', 'true');
        document.getElementById('downloadPopup').classList.add('hidden');
    }

    async function downloadFile() {
        try {
            const shaResponse = await fetch(`https://api.github.com/repos/${repoOwner}/${repoName}/commits?t=${Date.now()}`);
            const commits = await shaResponse.json();
            const sha = commits[0].sha;
            const fileUrl = `https://cdn.jsdelivr.net/gh/${repoOwner}/${repoName}@${sha}/algebraofficialfile.html`;
            const response = await fetch(fileUrl);
            const blob = await response.blob();
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = 'algebraofficialfile.html';
            document.body.appendChild(a); a.click(); window.URL.revokeObjectURL(url); document.body.removeChild(a);
        } catch(e) { alert("Download failed."); }
    }

    async function loadData() {
        try {
            document.getElementById('mainLogoImg').src = cdnBase + 'logo.png';
            document.getElementById('penguinHeadImg').src = cdnBase + 'penguinhead.png';
           
            const shaResponse = await fetch(`https://api.github.com/repos/${repoOwner}/${repoName}/commits?t=${Date.now()}`);
            const commits = await shaResponse.json();
            currentLatestSha = commits[0].sha;
            const gamesResponse = await fetch(`https://cdn.jsdelivr.net/gh/${repoOwner}/${repoName}@${currentLatestSha}/games.json`);
            games = await gamesResponse.json();
            const linksResponse = await fetch(`https://cdn.jsdelivr.net/gh/${repoOwner}/${repoName}@${currentLatestSha}/links.json`);
            backups = await linksResponse.json();

            renderCategoryTabs();
            renderGames('games');
        } catch (error) { console.error("Error loading data:", error); }
    }

    function renderCategoryTabs() {
        const container = document.getElementById('categoryTabs');
        container.innerHTML = '';
        const categories = ['All', ...new Set(games.map(g => g.category || 'Uncategorized'))];
        categories.forEach(cat => {
            const tab = document.createElement('div');
            tab.className = `cat-tab ${cat === currentCategory ? 'active' : ''}`;
            tab.textContent = cat;
            tab.onclick = () => { currentCategory = cat; renderCategoryTabs(); renderGames(currentFilter); };
            container.appendChild(tab);
        });
    }

    function renderGames(filter = 'games', search = '') {
        currentFilter = filter;
        const grid = document.getElementById('gameGrid');
        grid.innerHTML = '';

        let items = filter === 'backups' ? backups : games;

        items = items.filter(item => {
            if (filter === 'apps' && item.type !== 'app') return false;
            if (filter === 'games' && item.type === 'app') return false;
            if (search) {
                const term = search.toLowerCase();
                return (item.title && item.title.toLowerCase().includes(term)) || (item.genre && item.genre.toLowerCase().includes(term));
            }
            if (currentCategory !== 'All' && (item.category || 'Uncategorized') !== currentCategory) return false;
            return true;
        });

        if (filter === 'backups') {
            items.forEach(item => {
                const card = document.createElement('div');
                card.className = 'backup-card';
                card.onclick = () => window.open(item.url, '_blank');
                card.innerHTML = `<i class="fas ${item.icon || 'fa-link'}"></i><div class="backup-label">${item.title}</div>`;
                grid.appendChild(card);
            });
            return;
        }

        if (currentCategory === 'All') {
            const grouped = {};
            items.forEach(item => {
                const cat = item.category || 'Uncategorized';
                if (!grouped[cat]) grouped[cat] = [];
                grouped[cat].push(item);
            });
            Object.keys(grouped).sort().forEach(category => {
                const header = document.createElement('div');
                header.className = 'group-header';
                header.textContent = category.toUpperCase();
                grid.appendChild(header);
                grouped[category].forEach(item => createGameCard(item, grid));
            });
        } else {
            items.forEach(item => createGameCard(item, grid));
        }
    }

    function createGameCard(item, grid) {
        const card = document.createElement('div');
        card.className = 'game-card';
        card.innerHTML = `
            <img src="${cdnBase}${item.thumb}" loading="lazy">
            <div class="card-title">
                <span>${item.title}</span>
                <div onclick="event.stopImmediatePropagation(); showGameDetails('${item.id}')" class="more-btn">⋯</div>
            </div>
        `;
        card.onclick = (e) => {
            if (!e.target.closest('.more-btn')) openGame(item.id);
        };
        grid.appendChild(card);
    }

    function showGameDetails(id) {
        const game = games.find(g => g.id === id);
        if (!game) return;

        currentGameId = id;
        document.getElementById('detailsTitle').textContent = game.title;
        document.getElementById('detailsThumb').src = cdnBase + game.thumb;
        document.getElementById('detailsGenre').textContent = game.genre || "Unknown";
        document.getElementById('detailsDesc').textContent = game.description || "No description available.";

        loadReviews();
        initAnalyticsChart();
        switchTab(0);
        document.getElementById('gameDetailsModal').classList.remove('hidden');
    }

    function switchTab(n) {
        for (let i = 0; i < 3; i++) {
            document.getElementById('tab' + i).classList.toggle('active', i === n);
            document.getElementById('tabContent' + i).classList.toggle('hidden', i !== n);
        }
    }

    function initAnalyticsChart() {
        const ctx = document.getElementById('analyticsChart');
        if (analyticsChart) analyticsChart.destroy();
        
        analyticsChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['1h ago', '45m', '30m', '15m', 'Now'],
                datasets: [{
                    label: 'Playing',
                    data: [680, 720, 650, 810, 842],
                    borderColor: '#22c55e',
                    backgroundColor: 'rgba(34, 197, 94, 0.2)',
                    tension: 0.4
                }, {
                    label: 'Tab Open',
                    data: [1240, 1380, 1190, 1450, 1284],
                    borderColor: '#9ca3af',
                    backgroundColor: 'rgba(156, 163, 175, 0.2)',
                    tension: 0.4
                }]
            },
            options: { responsive: true, plugins: { legend: { display: true, position: 'top' } } }
        });
    }

    function loadReviews() {
        const list = document.getElementById('reviewsList');
        list.innerHTML = '';
        const reviews = JSON.parse(localStorage.getItem('gameReviews_' + currentGameId) || '[]');
        
        if (reviews.length === 0) {
            list.innerHTML = '<p class="text-gray-400 text-center py-8">No reviews yet. Be the first!</p>';
            return;
        }

        reviews.forEach((review, index) => {
            const div = document.createElement('div');
            div.className = "bg-slate-800 p-4 rounded-2xl";
            div.innerHTML = `
                <div class="flex justify-between items-start">
                    <div class="flex">${'★'.repeat(review.rating || 5)}</div>
                    <div>
                        <button onclick="editReview(${index})" class="text-blue-400 text-xs mr-3">Edit</button>
                        <button onclick="deleteReview(${index})" class="text-red-400 text-xs">Delete</button>
                    </div>
                </div>
                <p class="italic mt-2">"${review.text}"</p>
                <p class="text-xs text-gray-400 mt-2">- ${review.author} • ${review.time}</p>
            `;
            list.appendChild(div);
        });
    }

    function setRating(stars) {
        currentRating = stars;
        const starsEl = document.getElementById('starRating').children;
        for (let i = 0; i < 5; i++) {
            starsEl[i].style.color = i < stars ? '#fbbf24' : '#9ca3af';
        }
    }

    function submitReview() {
        const input = document.getElementById('reviewInput');
        if (!input.value.trim()) return;

        const reviews = JSON.parse(localStorage.getItem('gameReviews_' + currentGameId) || '[]');
        reviews.unshift({
            text: input.value.trim(),
            author: "You",
            time: "Just now",
            rating: currentRating
        });

        localStorage.setItem('gameReviews_' + currentGameId, JSON.stringify(reviews));
        input.value = "";
        loadReviews();
    }

    function editReview(index) {
        const reviews = JSON.parse(localStorage.getItem('gameReviews_' + currentGameId) || '[]');
        const newText = prompt("Edit your review:", reviews[index].text);
        if (newText !== null && newText.trim() !== "") {
            reviews[index].text = newText.trim();
            localStorage.setItem('gameReviews_' + currentGameId, JSON.stringify(reviews));
            loadReviews();
        }
    }

    function deleteReview(index) {
        if (confirm("Delete this review?")) {
            const reviews = JSON.parse(localStorage.getItem('gameReviews_' + currentGameId) || '[]');
            reviews.splice(index, 1);
            localStorage.setItem('gameReviews_' + currentGameId, JSON.stringify(reviews));
            loadReviews();
        }
    }

    function playFromDetails() {
        closeDetailsModal();
        const title = document.getElementById('detailsTitle').textContent;
        const game = games.find(g => g.title === title);
        if (game) openGame(game.id);
    }

    function closeDetailsModal() {
        document.getElementById('gameDetailsModal').classList.add('hidden');
    }

    function openGame(id) {
        const game = games.find(g => g.id === id);
        if(!game) return;
        document.getElementById('modalTitle').textContent = game.title;
        document.getElementById('modalIcon').src = cdnBase + game.thumb;
        document.getElementById('iframeContainer').innerHTML = `<iframe id="gameIframe" src="${game.url}" class="w-full h-full border-none" allowfullscreen></iframe>`;
        document.getElementById('gameModal').classList.remove('hidden');
    }

    function closeGame() {
        document.getElementById('gameModal').classList.add('hidden');
        document.getElementById('iframeContainer').innerHTML = '';
    }

    function openRandomGame() {
        if(games.length > 0) openGame(games[Math.floor(Math.random() * games.length)].id);
    }

    // Particles
    const canvas = document.getElementById('particle-canvas');
    const ctx = canvas.getContext('2d');
    let pts = [];

    function initPts() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        pts = Array(40).fill().map(() => ({ x:Math.random()*canvas.width, y:Math.random()*canvas.height, s:Math.random()*2, v:Math.random()*0.5+0.2 }));
    }

    function draw() {
        if(!particlesEnabled) { ctx.clearRect(0,0,canvas.width,canvas.height); return requestAnimationFrame(draw); }
        ctx.clearRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--primary');
        pts.forEach(p => { p.y -= p.v; if(p.y<0) p.y=canvas.height; ctx.beginPath(); ctx.arc(p.x,p.y,p.s,0,7); ctx.fill(); });
        requestAnimationFrame(draw);
    }

    function toggleParticles() {
        particlesEnabled = !particlesEnabled;
    }

    function toggleSettings() {
        const panel = document.getElementById('settingsPanel');
        panel.style.transform = panel.style.transform === 'translateX(0%)' ? 'translateX(100%)' : 'translateX(0%)';
    }

    function toggleInfo() {
        document.getElementById('infoTab').classList.toggle('hidden');
    }

    function updatePrimary(color) {
        document.documentElement.style.setProperty('--primary', color);
    }

    function openAboutBlank() {
        const iframe = document.getElementById('gameIframe');
        const targetUrl = iframe ? iframe.src : window.location.href;
        const win = window.open();
        if (!win) return alert("Please allow popups!");
        const doc = win.document;
        doc.title = document.title;
        const outerIframe = doc.createElement('iframe');
        outerIframe.style.width = "100%"; outerIframe.style.height = "100%"; outerIframe.style.border = "none";
        outerIframe.style.position = "fixed"; outerIframe.style.top = "0"; outerIframe.style.left = "0";
        outerIframe.src = targetUrl;
        doc.body.appendChild(outerIframe);
    }

    function toggleFullscreen() {
        const el = document.getElementById('gameIframe');
        if (el && el.requestFullscreen) el.requestFullscreen();
    }

    window.onload = () => {
        if (localStorage.getItem('hideDownloadPopup') !== 'true') {
            document.getElementById('downloadPopup').classList.remove('hidden');
        }
        loadData();
        initPts();
        draw();
    };

    document.getElementById('searchInput').oninput = (e) => renderGames(currentFilter, e.target.value);
    window.onresize = initPts;
</script>
</body>
</html>
